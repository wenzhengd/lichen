name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Validate wheel install in a fresh environment
        run: |
          python -m venv /tmp/lichen-wheel-venv
          /tmp/lichen-wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/lichen-wheel-venv/bin/python -m pip install dist/*.whl
          /tmp/lichen-wheel-venv/bin/python - <<'PY'
          import lichen

          print(lichen.__name__)
          PY
